# GitLab CI for windsurf-tracking
# Builds the frontend, pushes to Harbor, bumps the kustomize tag for ArgoCD.
#
# The backend image (annotation-api:v2-auth) is NOT built here — it was built
# from source newer than this repo (JWT auth). Pinned in kubernetes/ manifests.

workflow:
  auto_cancel:
    on_new_commit: interruptible

variables:
  HARBOR_REGISTRY: harbor.tclab.org
  HARBOR_PROJECT: windsurf
  DOCKER_TLS_CERTDIR: ""

stages:
  - build
  - deploy

build-frontend:
  stage: build
  interruptible: true
  tags:
    - docker
    - vm
  image: harbor.tclab.org/dockerhub/library/docker:24-cli
  variables:
    DOCKER_HOST: unix:///var/run/docker.sock
    DOCKER_BUILDKIT: 1
  before_script:
    - echo "$HARBOR_PASSWORD" | docker login $HARBOR_REGISTRY -u "$HARBOR_USERNAME" --password-stdin
  script:
    - export TZ=Europe/Stockholm
    - BUILD_VERSION=$(date +"%Y%m%d.%H%M")
    - IMAGE=$HARBOR_REGISTRY/$HARBOR_PROJECT/frontend
    - echo "FRONTEND BUILD - Commit:$CI_COMMIT_SHORT_SHA Version:$BUILD_VERSION"
    - docker pull $IMAGE:latest || true
    - docker build --progress=plain --build-arg APP_VERSION=$CI_COMMIT_SHORT_SHA --cache-from $IMAGE:latest -t $IMAGE:$CI_COMMIT_SHORT_SHA frontend/
    - docker tag $IMAGE:$CI_COMMIT_SHORT_SHA $IMAGE:latest
    - docker tag $IMAGE:$CI_COMMIT_SHORT_SHA $IMAGE:$BUILD_VERSION
    - docker push $IMAGE:$CI_COMMIT_SHORT_SHA
    - docker push $IMAGE:latest
    - docker push $IMAGE:$BUILD_VERSION
    - docker logout $HARBOR_REGISTRY
  only:
    - main

# Update kustomization.yaml image tag for ArgoCD GitOps
update-manifest:
  stage: deploy
  tags:
    - docker
    - vm
  image:
    name: harbor.tclab.org/dockerhub/alpine/git:latest
    entrypoint: [""]
  variables:
    GIT_STRATEGY: clone
    GIT_DEPTH: 0
  before_script:
    - apk add --no-cache yq
  script:
    - git config user.email "ci@gitlab.tclab.org"
    - git config user.name "GitLab CI"
    - git remote set-url origin https://oauth2:${GITLAB_PUSH_TOKEN}@gitlab.tclab.org/${CI_PROJECT_PATH}.git
    - echo "Updating frontend image tag to ${CI_COMMIT_SHORT_SHA}"
    - 'yq -i ".images[0].newTag = strenv(CI_COMMIT_SHORT_SHA)" kubernetes/kustomization.yaml'
    - cat kubernetes/kustomization.yaml
    - git add kubernetes/kustomization.yaml
    - 'git diff --staged --quiet || git commit -m "chore: deploy frontend ${CI_COMMIT_SHORT_SHA} [skip ci]"'
    - git push origin HEAD:main
  only:
    - main
  environment:
    name: production
    url: https://labelbee.tclab.org
