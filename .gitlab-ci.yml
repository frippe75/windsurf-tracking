# GitLab CI for windsurf-tracking
# Builds the frontend, pushes to Harbor, bumps the kustomize tag for ArgoCD.
#
# Backend builds are overlays on the annotation-api:base image (backend/Dockerfile):
# the base's ML-stack build context is lost, so only /app/app code is replaced.
# (:base replaced :v2-auth, which was deleted from Harbor 2026-07-17.)

workflow:
  auto_cancel:
    on_new_commit: interruptible

variables:
  HARBOR_REGISTRY: harbor.tclab.org
  HARBOR_PROJECT: windsurf
  DOCKER_TLS_CERTDIR: ""

stages:
  - test
  - build
  - deploy

test-frontend:
  stage: test
  interruptible: true
  tags:
    - docker
    - vm
  image: harbor.tclab.org/dockerhub/library/node:22-slim
  script:
    - cd frontend
    - npm ci --no-audit --no-fund
    - npm test
  only:
    - main
    - merge_requests
  except:
    - schedules

test-backend:
  stage: test
  interruptible: true
  tags:
    - docker
    - vm
  # Base image carries the ML/DB deps (site-packages); assemble current source
  # in a writable /tmp workspace (the container runs as non-root; /app is ro).
  # :base replaced :v2-auth (deleted from Harbor 2026-07-17).
  image: harbor.tclab.org/windsurf/annotation-api:base
  variables:
    PYTHONPATH: /tmp/ws
    HOME: /tmp
  script:
    - mkdir -p /tmp/ws
    - cp -r backend/app /tmp/ws/app
    - cp -r windsurf-sail-dataset/windsurf /tmp/ws/windsurf && echo '__version__="test"' > /tmp/ws/windsurf/__init__.py
    - cp -r backend/tests /tmp/ws/tests
    - cd /tmp/ws && python -m pytest tests/ -q -p no:cacheprovider
  only:
    - main
    - merge_requests
  except:
    - schedules

# pipeline_engine (dep-light core) + pipeline_service (FastAPI wrapper). Self-contained on
# a plain python image so it never breaks with the annotation-api:base tag. Verifies the
# model registry / SAM3 / VLM / service routing — no GPU, no network (handles are faked).
test-pipeline:
  stage: test
  interruptible: true
  tags:
    - docker
    - vm
  image: harbor.tclab.org/dockerhub/library/python:3.12-slim
  variables:
    PIP_DISABLE_PIP_VERSION_CHECK: "1"
    PIP_NO_CACHE_DIR: "1"
  script:
    # libglib2.0-0 is opencv-python-headless's one runtime dep (used by the mask->polygon tests)
    - apt-get update && apt-get install -y --no-install-recommends libglib2.0-0 && rm -rf /var/lib/apt/lists/*
    - pip install --quiet pydantic pyyaml networkx pillow numpy opencv-python-headless fastapi httpx pytest
    - python -m pytest pipeline_engine/tests pipeline_service/tests -q -p no:cacheprovider
  only:
    - main
    - merge_requests
  except:
    - schedules

build-frontend:
  stage: build
  interruptible: true
  tags:
    - docker
    - vm
  image: harbor.tclab.org/dockerhub/library/docker:24-cli
  variables:
    DOCKER_HOST: unix:///var/run/docker.sock
    DOCKER_BUILDKIT: 1
  before_script:
    - echo "$HARBOR_PASSWORD" | docker login $HARBOR_REGISTRY -u "$HARBOR_USERNAME" --password-stdin
  script:
    - export TZ=Europe/Stockholm
    - BUILD_VERSION=$(date +"%Y%m%d.%H%M")
    - IMAGE=$HARBOR_REGISTRY/$HARBOR_PROJECT/frontend
    - echo "FRONTEND BUILD - Commit:$CI_COMMIT_SHORT_SHA Version:$BUILD_VERSION"
    - docker pull $IMAGE:latest || true
    - docker build --progress=plain --build-arg APP_VERSION=$CI_COMMIT_SHORT_SHA --cache-from $IMAGE:latest -t $IMAGE:$CI_COMMIT_SHORT_SHA frontend/
    - docker tag $IMAGE:$CI_COMMIT_SHORT_SHA $IMAGE:latest
    - docker tag $IMAGE:$CI_COMMIT_SHORT_SHA $IMAGE:$BUILD_VERSION
    - docker push $IMAGE:$CI_COMMIT_SHORT_SHA
    - docker push $IMAGE:latest
    - docker push $IMAGE:$BUILD_VERSION
    - docker logout $HARBOR_REGISTRY
  only:
    - main
  except:
    - schedules

build-backend:
  stage: build
  interruptible: true
  tags:
    - docker
    - vm
  image: harbor.tclab.org/dockerhub/library/docker:24-cli
  variables:
    DOCKER_HOST: unix:///var/run/docker.sock
    DOCKER_BUILDKIT: 1
  before_script:
    - echo "$HARBOR_PASSWORD" | docker login $HARBOR_REGISTRY -u "$HARBOR_USERNAME" --password-stdin
  script:
    - IMAGE=$HARBOR_REGISTRY/$HARBOR_PROJECT/annotation-api
    - echo "BACKEND OVERLAY BUILD - Commit:$CI_COMMIT_SHORT_SHA"
    - docker build --progress=plain --build-arg APP_VERSION=$CI_COMMIT_SHORT_SHA -f backend/Dockerfile -t $IMAGE:$CI_COMMIT_SHORT_SHA .
    - docker push $IMAGE:$CI_COMMIT_SHORT_SHA
    # Refresh the :base tag every build so it stays a recent artifact Harbor GC
    # won't prune (it has repeatedly deleted the static base, breaking test-backend
    # + build-backend which both FROM :base). Proper fix is a Harbor immutability/
    # retention rule for `base` — needs project-admin (the CI robot is denied).
    - docker tag $IMAGE:$CI_COMMIT_SHORT_SHA $IMAGE:base
    - docker push $IMAGE:base
    - docker logout $HARBOR_REGISTRY
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" && $CI_PIPELINE_SOURCE != "schedule"'
      changes:
        - backend/**/*
        - windsurf-sail-dataset/windsurf/**/*

# Update kustomization.yaml image tags for ArgoCD GitOps
update-manifest:
  stage: deploy
  tags:
    - docker
    - vm
  image:
    name: harbor.tclab.org/dockerhub/alpine/git:latest
    entrypoint: [""]
  variables:
    GIT_STRATEGY: clone
    GIT_DEPTH: 0
  before_script:
    - apk add --no-cache yq curl
  script:
    - git config user.email "ci@gitlab.tclab.org"
    - git config user.name "GitLab CI"
    - git remote set-url origin https://oauth2:${GITLAB_PUSH_TOKEN}@gitlab.tclab.org/${CI_PROJECT_PATH}.git
    - echo "Updating frontend image tag to ${CI_COMMIT_SHORT_SHA}"
    - 'yq -i "(.images[] | select(.name == \"*frontend\")).newTag = strenv(CI_COMMIT_SHORT_SHA)" kubernetes/kustomization.yaml'
    # Bump backend tag only if build-backend produced an image for this commit
    - |
      if curl -sf -u "$HARBOR_USERNAME:$HARBOR_PASSWORD" \
           -H "Accept: application/vnd.docker.distribution.manifest.v2+json" \
           -o /dev/null \
           "https://$HARBOR_REGISTRY/v2/$HARBOR_PROJECT/annotation-api/manifests/$CI_COMMIT_SHORT_SHA"; then
        echo "Updating backend image tag to ${CI_COMMIT_SHORT_SHA}"
        yq -i '(.images[] | select(.name == "*annotation-api")).newTag = strenv(CI_COMMIT_SHORT_SHA)' kubernetes/kustomization.yaml
      else
        echo "No backend image for this commit - leaving backend tag unchanged"
      fi
    - cat kubernetes/kustomization.yaml
    - git add kubernetes/kustomization.yaml
    - 'git diff --staged --quiet || git commit -m "chore: deploy frontend ${CI_COMMIT_SHORT_SHA} [skip ci]"'
    - git push origin HEAD:main
  only:
    - main
  except:
    - schedules
  environment:
    name: production
    url: https://labelbee.tclab.org

# Nightly synthetic-monitoring e2e: runs the full tracking journey (auth ->
# project -> class -> upload clip -> track -> assert -> cleanup) against the
# DEPLOYED API. Gated to scheduled pipelines with NIGHTLY_E2E=true (set by a
# GitLab pipeline schedule); never runs on pushes/MRs. Needs masked CI var
# E2E_PASSWORD. Also doubles as a GPU-worker canary. ~3 min.
e2e-tracking-nightly:
  stage: test
  interruptible: false
  tags:
    - docker
    - vm
  image: harbor.tclab.org/dockerhub/library/python:3.12-slim
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule" && $NIGHTLY_E2E == "true"'
  script:
    - python scripts/e2e_tracking.py --base https://windsurf-api.tclab.org --timeout 300

# Browser e2e (tier 2) — drives the deployed app in Chromium. Same nightly gate
# as the API journey. Installs Chromium into the node image (slow but nightly-ok).
# Needs masked CI var E2E_PASSWORD (shared with the API journey).
browser-e2e-nightly:
  stage: test
  interruptible: false
  tags:
    - docker
    - vm
  image: harbor.tclab.org/dockerhub/library/node:22-slim
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule" && $NIGHTLY_E2E == "true"'
  script:
    - cd frontend
    - npm ci --no-audit --no-fund
    - npx playwright install --with-deps chromium
    - npx playwright test
