# Frame specification format documentation
frame_spec_format:
  description: "Flexible frame specification syntax"
  examples:
    single_frame: "864"
    multiple_frames: "864,900,936" 
    frame_range: "864-1056"
    range_with_step: "864-1056:25"  # Every 25th frame in range
    mixed: "100,200,500-600:10,800"  # Mix of single, range, and step
  
  parsing_rules:
    - "Comma separates different frame specifications"
    - "Dash indicates range (start-end)"
    - "Colon indicates step size for range (:step)"
    - "Single numbers are individual frames"

# Filter test configuration
filter_test_config:
  sail_count_filter:
    confidence_threshold: 0.3
    valid_sail_range: [1, 2]
    
  water_detection_filter:
    min_water_percentage: 0.4
    horizon_detection_min: 0.6
    
  scrubbing_defaults:
    scrub_interval: 25
    max_attempts: 5
    early_accept_threshold: 0.8
    early_reject_threshold: 0.2

# Expected outcomes for validation
validation_targets:
  competition_footage_acceptance_rate: 0.8  # 80% of competition clips should pass
  rejection_reasons:
    - "No sails detected"
    - "Too many sails (>2)"  
    - "Not on water"
    - "Poor lighting/quality"