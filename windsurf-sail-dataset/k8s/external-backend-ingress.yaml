apiVersion: v1
kind: Service
metadata:
  name: windsurf-backend-external
  namespace: default
spec:
  type: ExternalName
  externalName: k8s-w09.lab.loc  # Points to your machine
  ports:
  - port: 8000
    targetPort: 8000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: windsurf-backend-api
  namespace: default
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-tclab"
    nginx.org/client-max-body-size: "200m"  # For video uploads
    nginx.org/proxy-connect-timeout: "600s"
    nginx.org/proxy-read-timeout: "600s"
    nginx.org/upstream-keepalive-timeout: "600s"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - windsurf-api.tclab.org
    secretName: windsurf-api-tls
  rules:
  - host: windsurf-api.tclab.org
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: windsurf-backend-external
            port:
              number: 8000