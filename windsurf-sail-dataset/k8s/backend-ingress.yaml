apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: windsurf-backend-api
  namespace: default
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-tclab"
    nginx.org/client-max-body-size: "200m"  # For video uploads
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - windsurf-api.tclab.org
    secretName: windsurf-api-tls
  rules:
  - host: windsurf-api.tclab.org
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: windsurf-backend
            port:
              number: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: windsurf-backend
  namespace: default
spec:
  selector:
    app: windsurf-backend
  ports:
  - name: http
    port: 8000
    targetPort: 8000
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: windsurf-backend
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: windsurf-backend
  template:
    metadata:
      labels:
        app: windsurf-backend
    spec:
      containers:
      - name: backend
        image: harbor.tclab.org/windsurf/pipeline:v1.0
        command: ["python", "/app/windsurf-sail-dataset/backend/main.py"]
        ports:
        - containerPort: 8000
        env:
        - name: PYTHONPATH
          value: "/app:/app/windsurf-sail-dataset"
        resources:
          requests:
            memory: "2Gi"
            cpu: "1"
          limits:
            memory: "4Gi"
            cpu: "2"