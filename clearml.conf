  worker_name: "windsurf-sail-detector"
  worker_id: ""
  
  # Use Harbor Docker image for task execution
  default_docker {
    image: "harbor.tclab.org/windsurf/pipeline:v1.0"
    arguments: ["--rm", "--gpus=all", "-v", "/tmp:/tmp"]
