# The AI model fleet — one declarative source of truth. Register with:
#   from pipeline_engine.config import load_models_yaml; load_models_yaml("models.yaml")
# Consumers pick by CAPABILITY, never by hardcoded name:
#   MODELS.by_capability("concept-segment")  -> ["sam3"]
#   MODELS.by_capability("vlm-extract")       -> ["qwen3-vl"]
# Serving (local vs external) is just base_url. Secrets via auth_env (never inline).
models:
  # --- filtering / metadata pipeline ---
  - name: qwen3-vl
    type: openai-compat-http
    capabilities: [vlm-extract]
    model_name: Qwen/Qwen3-VL-8B-Instruct
    base_url: https://api.runpod.ai/v2/<VLM_ENDPOINT_ID>/openai/v1
    auth_env: RUNPOD_API_KEY

  # --- concept (text) + click segmentation, prep for tracking ---
  - name: sam3
    type: sam3-runpod
    capabilities: [concept-segment, segment-click]
    base_url: https://api.runpod.ai/v2/<SAM3_ENDPOINT_ID>
    auth_env: RUNPOD_API_KEY

  # --- concept (text) VIDEO tracking: SAM3 video predictor, native masklets across frames ---
  - name: sam3-video
    type: sam3-runpod-track
    capabilities: [concept-track]
    base_url: https://api.runpod.ai/v2/<SAM3_VIDEO_ENDPOINT_ID>
    auth_env: RUNPOD_API_KEY
    timeout_s: 290

  # --- frontier VLM for dataset metadata extraction (grid image + JSON schema) ---
  - name: claude
    type: anthropic
    capabilities: [metadata-extract]
    model_name: claude-sonnet-5
    base_url: https://api.anthropic.com/v1
    auth_env: ANTHROPIC_API_KEY
    timeout_s: 120

  # --- click segmentation on the lab backend (SAM2 stays local) ---
  - name: sam2-local
    type: sam2-http
    capabilities: [segment-click]
    base_url: https://windsurf-api.tclab.org/api/ai/sam2

  # --- trained YOLO detectors, served on-prem (loads best.pt by dataset version) ---
  - name: trained-yolo
    type: yolo-http
    capabilities: [detect]
    base_url: http://windsurf-prod-yolo-serve:8080
    timeout_s: 60
