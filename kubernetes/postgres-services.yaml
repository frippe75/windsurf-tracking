apiVersion: v1
kind: Service
metadata:
  name: windsurf-prod-postgres
  labels:
    app.kubernetes.io/name: windsurf-ai
    app.kubernetes.io/instance: windsurf-prod
    component: database
spec:
  type: ClusterIP
  ports:
  - port: 5432
    targetPort: 5432
    name: postgres
  selector:
    app.kubernetes.io/name: windsurf-ai
    app.kubernetes.io/instance: windsurf-prod
    component: database
---
apiVersion: v1
kind: Service
metadata:
  name: windsurf-prod-postgres-headless
  labels:
    app.kubernetes.io/name: windsurf-ai
    app.kubernetes.io/instance: windsurf-prod
    component: database
spec:
  type: ClusterIP
  clusterIP: None
  ports:
  - port: 5432
    targetPort: 5432
    name: postgres
  selector:
    app.kubernetes.io/name: windsurf-ai
    app.kubernetes.io/instance: windsurf-prod
    component: database
