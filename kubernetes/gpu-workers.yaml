# gpu-worker-0 serves the live AI routes (SAM2 segment dispatches to celery
# queue gpu_0_worker with a 30s wait) — keep at 1. gpu-worker-1 stays at 0;
# batch processing offloads to ClearML.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: windsurf-prod-gpu-worker-0
  labels:
    app.kubernetes.io/name: windsurf-ai
    app.kubernetes.io/instance: windsurf-prod
    component: gpu-worker
    gpu-id: "0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: windsurf-ai
      app.kubernetes.io/instance: windsurf-prod
      component: gpu-worker
      gpu-id: "0"
  template:
    metadata:
      labels:
        app.kubernetes.io/name: windsurf-ai
        app.kubernetes.io/instance: windsurf-prod
        component: gpu-worker
        gpu-id: "0"
    spec:
      containers:
      - name: gpu-worker
        image: harbor.tclab.org/windsurf/ai-celery-worker:v2.4-tracking
        command: ["celery", "-A", "workers.celery", "worker", "--loglevel=info", "--queues=gpu_0_worker", "--without-heartbeat", "--without-gossip", "--without-mingle", "--pool=solo"]
        env:
        - name: CUDA_VISIBLE_DEVICES
          value: "0"
        - name: WORKER_ID
          value: "0"
        - name: REDIS_URL
          value: "redis://windsurf-prod-redis:6379"
        - name: CELERY_BROKER
          value: "redis://windsurf-prod-redis:6379/1"
        # S3 access so track_objects_task can fetch the source video (the worker
        # has no shared FS with the API). Same bucket/creds as the backend.
        - name: S3_ENDPOINT
          value: "http://rook-ceph-rgw-ceph-objectstore.rook-ceph.svc.cluster.local"
        - name: S3_BUCKET
          value: "windsurf-videos"
        - name: S3_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: windsurf-s3-secret
              key: access-key
        - name: S3_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: windsurf-s3-secret
              key: secret-key
        resources:
          requests:
            memory: 4Gi
            cpu: 1
            nvidia.com/gpu: 1
          limits:
            memory: 16Gi
            cpu: 4
            nvidia.com/gpu: 1
      # GPU node health (2026-07-16): k8s-w06 & k8s-w07 have an NVIDIA
      # driver/library version mismatch (new GPU containers fail the prestart
      # hook); k8s-w08 GPUs are fully allocated (ClearML). k8s-w09 is the only
      # node with working drivers + free GPUs, so pin here. Widen this back to a
      # NotIn exclusion once the w06/w07 drivers are reloaded.
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: nvidia.com/gpu.present
                operator: In
                values: ["true"]
              - key: kubernetes.io/hostname
                operator: In
                values: ["k8s-w09"]
      tolerations:
      - effect: NoSchedule
        key: nvidia.com/gpu
        operator: Exists
      # k8s-w09 (the only node with working GPU drivers + free GPUs) is cordoned;
      # tolerate the cordon so THIS pod can run there without uncordoning the node
      # cluster-wide. Remove once w06/w07 drivers are fixed and the pin is widened.
      - effect: NoSchedule
        key: node.kubernetes.io/unschedulable
        operator: Exists
---
