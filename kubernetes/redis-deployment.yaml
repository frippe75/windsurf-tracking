apiVersion: apps/v1
kind: Deployment
metadata:
  name: windsurf-prod-redis
  labels:
    app.kubernetes.io/name: windsurf-ai
    app.kubernetes.io/instance: windsurf-prod
    component: cache
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: windsurf-ai
      app.kubernetes.io/instance: windsurf-prod
      component: cache
  template:
    metadata:
      labels:
        app.kubernetes.io/name: windsurf-ai
        app.kubernetes.io/instance: windsurf-prod
        component: cache
    spec:
      containers:
      - name: redis
        image: harbor.tclab.org/dockerhub/library/redis:7-alpine
        ports:
        - containerPort: 6379
          name: redis
        livenessProbe:
          exec:
            command:
            - redis-cli
            - ping
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          exec:
            command:
            - redis-cli
            - ping
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
