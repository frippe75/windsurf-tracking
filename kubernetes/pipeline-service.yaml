# pipeline_service — FastAPI over pipeline_engine. Routes the SAM on/off + v2/v3 +
# local/external model selection, so the app drives it WITHOUT rebuilding the pinned
# annotation-api image. Exposed same-origin at labelbee.tclab.org/pipeline.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: windsurf-pipeline-service
---
# Least-privilege: only manage training Jobs (Train tab) in this namespace.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: windsurf-pipeline-train
rules:
- apiGroups: ["batch"]
  resources: ["jobs"]
  verbs: ["create", "get", "list", "delete"]
- apiGroups: [""]
  resources: ["pods", "pods/log"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: windsurf-pipeline-train
subjects:
- kind: ServiceAccount
  name: windsurf-pipeline-service
roleRef:
  kind: Role
  name: windsurf-pipeline-train
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: pipeline-service-models
data:
  models.yaml: |
    # The AI model fleet. Consumers pick by capability; serving (local/external) = base_url.
    models:
      - name: qwen3-vl
        type: openai-compat-http
        capabilities: [vlm-extract]
        model_name: Qwen/Qwen3-VL-8B-Instruct
        base_url: https://api.runpod.ai/v2/tkygyjxjx1vgn9/openai/v1
        auth_env: RUNPOD_API_KEY
      - name: sam3
        type: sam3-runpod
        capabilities: [concept-segment, segment-click]
        base_url: https://api.runpod.ai/v2/mr9jc82yc7jeo6
        auth_env: RUNPOD_API_KEY
        timeout_s: 290   # scale-to-zero cold start (model load) can take minutes
      - name: sam3-video
        type: sam3-runpod-track
        capabilities: [concept-track]
        base_url: https://api.runpod.ai/v2/fol0gl0bk858ae
        auth_env: RUNPOD_API_KEY
        timeout_s: 290
      - name: claude
        type: anthropic
        capabilities: [metadata-extract]
        model_name: claude-sonnet-5
        base_url: https://api.anthropic.com/v1
        auth_env: ANTHROPIC_API_KEY
        timeout_s: 120
      - name: sam2-local
        type: sam2-http
        capabilities: [segment-click]
        base_url: http://windsurf-prod-backend:8000/api/ai/sam2
      - name: trained-yolo
        type: yolo-http
        capabilities: [detect]
        base_url: http://windsurf-prod-yolo-serve:8080
        timeout_s: 60
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: windsurf-prod-pipeline-service
  labels:
    app: windsurf-pipeline-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: windsurf-pipeline-service
  template:
    metadata:
      labels:
        app: windsurf-pipeline-service
    spec:
      # Needs to create/read training Jobs in this namespace (Train tab → k8s GPU Job).
      serviceAccountName: windsurf-pipeline-service
      containers:
      - name: pipeline-service
        image: harbor.tclab.org/windsurf/pipeline-service:latest
        ports:
        - containerPort: 8080
        env:
        - name: SERVICE_PREFIX
          value: /pipeline
        - name: MODELS_YAML
          value: /config/models.yaml
        - name: BACKEND_URL
          value: http://windsurf-prod-backend:8000
        - name: RUNPOD_API_KEY
          valueFrom:
            secretKeyRef:
              name: runpod-secret
              key: RUNPOD_API_KEY
        - name: ANTHROPIC_API_KEY
          valueFrom:
            secretKeyRef:
              name: anthropic-secret
              key: ANTHROPIC_API_KEY
        # Training Job config: the image to run, and S3 to read metrics.json back.
        - name: TRAIN_IMAGE
          value: harbor.tclab.org/windsurf/train:v3
        - name: TRAIN_NAMESPACE
          value: windsurf-prod
        - name: S3_ENDPOINT
          value: http://rook-ceph-rgw-ceph-objectstore.rook-ceph.svc.cluster.local
        - name: S3_BUCKET
          value: windsurf-videos
        - name: S3_SECRET_NAME
          value: windsurf-s3-secret
        - name: S3_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: windsurf-s3-secret
              key: access-key
        - name: S3_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: windsurf-s3-secret
              key: secret-key
        volumeMounts:
        - name: models
          mountPath: /config
        readinessProbe:
          httpGet:
            path: /pipeline/health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /pipeline/health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 20
        resources:
          requests:
            cpu: 50m
            memory: 256Mi
          limits:
            cpu: "1"
            # /track extracts up to 120 frames (base64) in-pod; with the opencv baseline that
            # spikes past 512Mi and OOM-kills the pod (raw 502 on submit). 1Gi gives headroom.
            memory: 1Gi
      volumes:
      - name: models
        configMap:
          name: pipeline-service-models
---
apiVersion: v1
kind: Service
metadata:
  name: windsurf-prod-pipeline-service
spec:
  selector:
    app: windsurf-pipeline-service
  ports:
  - port: 8080
    targetPort: 8080
