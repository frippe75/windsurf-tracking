# App host — SPA frontend with same-origin API (deployed backend's CORS
# only allows lovable.app/localhost origins, so /api and /auth must be
# routed here rather than calling windsurf-api.tclab.org cross-origin).
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: windsurf-prod-labelbee
  labels:
    app.kubernetes.io/name: windsurf-ai
    app.kubernetes.io/instance: windsurf-prod
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-tclab"
    external-dns.alpha.kubernetes.io/hostname: "labelbee.tclab.org"
    external-dns.alpha.kubernetes.io/ttl: "300"
    nginx.org/client-max-body-size: "500m"  # Large video uploads
    nginx.org/proxy-connect-timeout: "600s"
    nginx.org/proxy-read-timeout: "600s"
    nginx.org/upstream-keepalive-timeout: "600s"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - labelbee.tclab.org
    secretName: windsurf-labelbee-tls
  rules:
  - host: labelbee.tclab.org
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: windsurf-prod-backend
            port:
              number: 8000
      - path: /auth
        pathType: Prefix
        backend:
          service:
            name: windsurf-prod-backend
            port:
              number: 8000
      - path: /
        pathType: Prefix
        backend:
          service:
            name: windsurf-prod-frontend
            port:
              number: 80
